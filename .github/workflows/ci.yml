name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Django check + migrate (sqlite for CI)
        env:
          SECRET_KEY: ci-dummy-secret-key-for-github-actions-only-do-not-use-in-prod
          DEBUG: "False"
          # Force sqlite for the check job (override in real project with test settings if needed)
          DATABASE_URL: sqlite:///:memory:
          POSTGRES_DB: ci
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_HOST: 127.0.0.1
          ALLOWED_HOSTS: "*"
        run: |
          python manage.py check --deploy
          python manage.py migrate --noinput

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker images (no cache to verify)
        run: |
          docker compose build --no-cache

      - name: Quick smoke (show images)
        run: docker images | grep -E 'task|nginx|postgres'
