{% extends "base.html" %}

{% block title %}Удалить задачу — Менеджер задач{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-10">
    <div class="bg-white border border-red-100 rounded-3xl p-8">
        <div class="text-red-600 text-4xl mb-4">🗑️</div>
        <h1 class="text-2xl font-semibold tracking-tight">Удалить задачу?</h1>
        <p class="mt-2 text-slate-600">Вы уверены, что хотите удалить задачу <strong>«{{ object.title }}»</strong>? Это действие нельзя отменить.</p>

        <form method="post" class="mt-6 flex gap-3">
            {% csrf_token %}
            <a href="{% url 'tasks:task-list' %}" class="flex-1 text-center py-2.5 rounded-2xl border border-slate-200 text-sm hover:bg-slate-50">Отмена</a>
            <button type="submit" class="flex-1 bg-red-600 hover:bg-red-700 text-white py-2.5 rounded-2xl text-sm font-semibold">Да, удалить</button>
        </form>
    </div>
</div>
{% endblock %}
