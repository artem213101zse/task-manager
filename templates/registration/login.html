{% extends "base.html" %}

{% block title %}Вход — Менеджер задач{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-12">
    <div class="bg-white rounded-3xl shadow-sm border border-slate-100 p-8">
        <div class="text-center mb-8">
            <div class="mx-auto w-14 h-14 bg-blue-600 rounded-2xl flex items-center justify-center text-white text-2xl font-bold mb-4">TM</div>
            <h1 class="text-2xl font-semibold tracking-tight">Войти в аккаунт</h1>
            <p class="text-slate-500 mt-1 text-sm">Управляйте своими задачами</p>
        </div>

        <form method="post" class="space-y-5">
            {% csrf_token %}

            {% if form.errors %}
                <div class="bg-red-50 border border-red-200 text-red-700 text-sm px-4 py-3 rounded-2xl">
                    Неверное имя пользователя или пароль.
                </div>
            {% endif %}

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5">Имя пользователя</label>
                <input type="text" name="username" required autofocus
                       class="w-full px-4 py-3 border border-slate-200 rounded-2xl focus:outline-none focus:border-blue-500 transition text-sm">
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5">Пароль</label>
                <input type="password" name="password" required
                       class="w-full px-4 py-3 border border-slate-200 rounded-2xl focus:outline-none focus:border-blue-500 transition text-sm">
            </div>

            <button type="submit"
                    class="w-full mt-2 py-3 bg-blue-600 hover:bg-blue-700 active:bg-blue-800 transition text-white rounded-2xl font-semibold text-sm">
                Войти
            </button>
        </form>

        <div class="mt-6 text-center text-sm">
            Нет аккаунта? 
            <a href="{% url 'tasks:register' %}" class="font-medium text-blue-600 hover:text-blue-700">Зарегистрироваться</a>
        </div>
    </div>
</div>
{% endblock %}
